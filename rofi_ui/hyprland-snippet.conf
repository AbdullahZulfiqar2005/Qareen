# --- Qareen rofi UI ---
# Append these lines to ~/.config/hypr/hyprland.conf (adjust the path to
# qareen-rofi.sh to wherever you cloned the repo), then `hyprctl reload`.

# Keybind: SUPER+A opens Qareen's prompt bar.
bind = SUPER, A, exec, ~/Qareen/rofi_ui/qareen-rofi.sh

# Smooth pop-in/out + blur for rofi's window, since rofi itself doesn't
# animate its own window open/close.
windowrulev2 = float, class:^(rofi)$
windowrulev2 = animation popin 90%, class:^(rofi)$
layerrule = blur, rofi
layerrule = ignorezero, rofi

# A slightly snappier bezier curve for that popin animation. If you already
# have an "animations" block, just add this bezier + animation line there
# instead of duplicating the block.
bezier = qareenPop, 0.16, 1, 0.3, 1
animations {
    enabled = yes
    animation = popin, 1, 3, qareenPop, popin 95%
    animation = fade, 1, 3, qareenPop
}
